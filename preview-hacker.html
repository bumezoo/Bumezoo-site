<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hacker Effect — Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
    }

    /* ── Test button ── */
    #test-btn {
      background: transparent;
      border: 2px solid #00ff41;
      color: #00ff41;
      font-family: 'Courier New', monospace;
      font-size: clamp(1rem, 4vw, 1.4rem);
      font-weight: bold;
      letter-spacing: .2em;
      padding: 1.2rem 3rem;
      cursor: pointer;
      text-transform: uppercase;
      transition: all .2s ease;
      box-shadow: 0 0 20px rgba(0,255,65,.3);
    }
    #test-btn:hover {
      background: rgba(0,255,65,.1);
      box-shadow: 0 0 40px rgba(0,255,65,.6);
    }

    /* ── Fullscreen overlay ── */
    #hacker-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: #000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #hacker-overlay.active { display: flex; }

    /* Matrix canvas fills the overlay */
    #matrix-canvas {
      position: absolute;
      inset: 0;
    }

    /* ── ACCESS DENIED screen ── */
    #denied-screen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: #000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.5rem;
    }
    #denied-screen.active { display: flex; }

    .denied-text {
      font-family: 'Courier New', monospace;
      font-size: clamp(2.5rem, 12vw, 8rem);
      font-weight: 900;
      color: #ff0000;
      letter-spacing: .1em;
      text-align: center;
      text-shadow:
        0 0 10px #ff0000,
        0 0 30px #ff0000,
        0 0 80px rgba(255,0,0,.6);
      animation: flicker 0.15s infinite alternate;
    }

    .denied-sub {
      font-family: 'Courier New', monospace;
      font-size: clamp(.7rem, 3vw, 1.1rem);
      color: rgba(255,0,0,.7);
      letter-spacing: .25em;
      text-transform: uppercase;
      animation: flicker 0.2s infinite alternate;
    }

    @keyframes flicker {
      0%   { opacity: 1; }
      100% { opacity: .85; }
    }
  </style>
</head>
<body>

  <button id="test-btn" onclick="startHack()">[ TEST LOGIN ]</button>

  <!-- Matrix overlay -->
  <div id="hacker-overlay" class="active" style="display:none">
    <canvas id="matrix-canvas"></canvas>
  </div>

  <!-- ACCESS DENIED screen -->
  <div id="denied-screen">
    <div class="denied-text">ACCESS<br>DENIED</div>
    <div class="denied-sub">⚠ &nbsp;INTRUSION DETECTED — SHUTTING DOWN &nbsp;⚠</div>
  </div>

  <script>
    const overlay  = document.getElementById('hacker-overlay');
    const canvas   = document.getElementById('matrix-canvas');
    const denied   = document.getElementById('denied-screen');
    const ctx      = canvas.getContext('2d');

    /* ── Matrix config ── */
    const CHARS = 'INTRUSION DETECTED ACCESS DENIED 01010011 0xDEAD BREACH ALERT SYSTEM FAILURE UNAUTHORIZED █▓░▒■□▪▫'.split('');
    const FONT_SIZE = 14;
    let cols, drops, animId;

    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      cols  = Math.floor(canvas.width / FONT_SIZE);
      drops = Array(cols).fill(1);
    }

    function drawMatrix() {
      /* semi-transparent black fade — creates the trail effect */
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.font = FONT_SIZE + 'px Courier New';

      for (let i = 0; i < drops.length; i++) {
        const char = CHARS[Math.floor(Math.random() * CHARS.length)];

        /* bright head */
        ctx.fillStyle = '#ffffff';
        ctx.fillText(char, i * FONT_SIZE, drops[i] * FONT_SIZE);

        /* body — neon green */
        ctx.fillStyle = i % 3 === 0 ? '#00ff41' : '#008f11';
        ctx.fillText(
          CHARS[Math.floor(Math.random() * CHARS.length)],
          i * FONT_SIZE,
          (drops[i] - 1) * FONT_SIZE
        );

        /* reset column randomly */
        if (drops[i] * FONT_SIZE > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }

      animId = requestAnimationFrame(drawMatrix);
    }

    function startHack() {
      /* show matrix */
      resizeCanvas();
      overlay.style.display = 'flex';
      animId = requestAnimationFrame(drawMatrix);

      /* after 6 s — stop matrix, show ACCESS DENIED */
      setTimeout(() => {
        cancelAnimationFrame(animId);
        overlay.style.display = 'none';
        denied.classList.add('active');

        /* after 2 s — reset everything */
        setTimeout(() => {
          denied.classList.remove('active');
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }, 2000);
      }, 6000);
    }

    window.addEventListener('resize', () => {
      if (overlay.style.display === 'flex') resizeCanvas();
    });
  </script>

</body>
</html>
